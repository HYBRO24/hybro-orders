<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYBRO Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F3;--bg2:#EFEEE9;--bg3:#E5E4DE;--white:#FFFFFF;
  --text:#1A1A18;--text2:#6B6B66;--text3:#9E9E99;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-text:#27500A;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-text:#633806;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --teal-bg:#9FE1CB;--teal-text:#04342C;
  --gray-bg:#F1EFE8;--gray-text:#444441;
  --radius:8px;--radius-lg:12px;
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.view{display:none;min-height:100vh}.view.active{display:block}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.rb{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.rb-hybro{background:var(--blue-bg);color:var(--blue-text)}.rb-exec{background:var(--green-bg);color:var(--green-text)}
.btn{font-family:var(--font);font-size:12px;padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--white);color:var(--text);cursor:pointer;transition:background .15s}
.btn:hover{background:var(--bg2)}.btn:active{transform:scale(.98)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{background:var(--blue-text);color:#fff}
.btn-g{background:var(--green);color:#fff;border-color:var(--green)}.btn-g:hover{background:var(--green-text);color:#fff}
.btn-d{color:var(--red);border-color:#F09595}.btn-d:hover{background:var(--red-bg)}
.btn-a{background:var(--amber);color:#fff;border-color:var(--amber)}.btn-a:hover{opacity:.9}
.btn-sm{font-size:11px;padding:4px 10px}.btn-xs{font-size:11px;padding:3px 8px}
.spill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap;display:inline-block}
.s-draft{background:var(--gray-bg);color:var(--gray-text)}.s-sent{background:var(--blue-bg);color:var(--blue-text)}
.s-review{background:var(--amber-bg);color:var(--amber-text)}.s-approved{background:var(--green-bg);color:var(--green-text)}
.s-accepted{background:var(--teal-bg);color:var(--teal-text)}.s-cancelled{background:var(--red-bg);color:var(--red)}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg)}
.oc{padding:12px 16px;cursor:pointer;transition:border-color .15s}.oc:hover{border-color:var(--border2)}
.main{padding:20px;max-width:1100px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:16px}
.sc{background:var(--bg2);border-radius:var(--radius);padding:10px 13px}
.sl{font-size:11px;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.sv{font-size:22px;font-weight:500}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.tbl{width:100%;border-collapse:collapse;table-layout:fixed}
.tbl th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);padding:8px;text-align:left;border-bottom:1px solid var(--border);font-weight:500}
.tbl td{font-size:13px;padding:9px 8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}.tbl tr:hover td{background:var(--bg)}
.tbl tfoot td{border-top:2px solid var(--border);border-bottom:none;font-weight:500;padding:9px 8px;background:var(--bg2)}
.act-row{display:flex;gap:8px;flex-wrap:wrap;padding:13px 20px;border-top:1px solid var(--border);align-items:center}
.pr-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}.pr-row:last-child{border-bottom:none}
.pr-add{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);font-family:var(--font)}
.pr-add:hover{background:var(--blue-bg);color:var(--blue-text);border-color:#85B7EB}
input,select,textarea{font-family:var(--font);font-size:13px;padding:6px 9px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--white);color:var(--text);outline:none}
input:focus,select:focus{border-color:var(--blue)}
input[type=number]{width:62px}
.banner{border-radius:var(--radius);padding:10px 13px;font-size:12px;margin-bottom:13px}
.banner-amber{background:var(--amber-bg);border:1px solid #EF9F27;color:var(--amber-text)}
.banner-blue{background:var(--blue-bg);border:1px solid #85B7EB;color:var(--blue-text)}
.acc-group{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;cursor:pointer;background:var(--bg2);user-select:none}
.acc-hdr:hover{background:var(--bg3)}.acc-hdr.open{background:var(--blue-bg)}
.acc-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.acc-hdr.open .acc-title{color:var(--blue-text)}
.acc-meta{font-size:11px;color:var(--text2);margin-left:6px}.acc-hdr.open .acc-meta{color:var(--blue-text);opacity:.7}
.acc-arrow{font-size:10px;color:var(--text2);transition:transform .2s}.acc-hdr.open .acc-arrow{transform:rotate(180deg);color:var(--blue-text)}
.acc-body{display:none;padding:4px 13px 8px}.acc-body.open{display:block}
.cal-wrap{display:inline-block}
#calGlobal{display:none;position:fixed;z-index:9999;background:var(--white);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:12px;width:252px;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
#calGlobal.open{display:block}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text2);padding:2px 6px;border-radius:var(--radius)}
.cal-nav-btn:hover{background:var(--bg2)}
.cal-month{font-size:13px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,32px);gap:0;justify-content:center}
.cal-dow{font-size:10px;text-align:center;color:var(--text2);padding:4px 0;font-weight:500;text-transform:uppercase;width:32px}
.cal-dow.we{color:var(--red)}
.cal-day{font-size:12px;text-align:center;padding:6px 0;border-radius:var(--radius);cursor:pointer;width:32px}
.cal-day:hover{background:var(--blue-bg);color:var(--blue-text)}
.cal-day.today{font-weight:500;background:var(--bg2)}
.cal-day.sel{background:var(--blue);color:#fff;font-weight:500}
.cal-day.we{color:var(--red)}.cal-day.we.sel{color:#fff}
.cal-day.empty{cursor:default}.cal-day.empty:hover{background:none}
.cal-today-btn{width:100%;margin-top:8px;font-size:11px;padding:5px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--font)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:8000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--white);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:380px;border:1px solid var(--border)}
.modal-title{font-size:14px;font-weight:500;margin-bottom:10px}
.modal-body{font-size:13px;color:var(--text2);margin-bottom:14px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;font-size:12px;padding:9px 16px;border-radius:var(--radius);opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999}
.toast.err{background:var(--red)}.toast.show{opacity:1}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite}.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.empty{text-align:center;padding:32px;color:var(--text2);font-size:13px}
.mono{font-family:var(--mono)}
.ph-hdr{display:none;padding:0 0 14px;border-bottom:1px solid #ccc;margin-bottom:14px}
@media print{
  .topbar,.act-row,.frow,.sg,.no-print{display:none!important}
  .card{border:1px solid #ccc!important;border-radius:0!important}
  .ph-hdr{display:block!important}
  body{background:#fff}.main{padding:0}
}
</style>
</head>

    <div class="modal-body" id="mBody"></div>
    <textarea id="mInput" rows="3" style="width:100%;margin-bottom:14px;resize:none;display:none"></textarea>
    <div class="modal-btns" id="mBtns"></div>
  </div>
</div>

let role='',cur=null,orders=[],ctr=1,PINS={hybro:'1234',exec:'5678'};
let refreshTimer=null,lastSync=null;

async function apiFetch(method,body){
  const opts={headers:{'X-Master-Key':AKEY}};
  if(method==='PUT'){opts.method='PUT';opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  const r=await fetch(AURL+(method==='GET'?'/latest':''),opts);
  if(!r.ok) throw new Error(method+' '+r.status);
  return r.json();
}
function syncUI(s){
  const d=document.getElementById('syncDot'),l=document.getElementById('syncLbl');
  if(!d||!l)return;
  d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  l.textContent=s==='syncing'?'Синхронізація...':s==='error'?'Помилка зв\'язку':lastSync?'Оновлено '+lastSync:'Готово';
}
async function loadData(spin){
  if(spin)document.getElementById('loadMsg').style.display='block';
  try{
    const j=await apiFetch('GET');
    if(j.record){if(j.record.orders)orders=j.record.orders;if(j.record.ctr)ctr=j.record.ctr;if(j.record.pins)PINS=j.record.pins;}
    lastSync=new Date().toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});syncUI('ok');
  }catch(e){syncUI('error');toast('Помилка завантаження',1);}
  if(spin)document.getElementById('loadMsg').style.display='none';
  updHint();
}
async function save(){
  syncUI('syncing');
  try{await apiFetch('PUT',{orders,ctr,pins:PINS});lastSync=new Date().toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});syncUI('ok');}
  catch(e){syncUI('error');toast('Помилка збереження!',1);}
}
async function forceSync(){
  const prev=orders.map(o=>o.status+o.id).join(',');
  await loadData();
  if(orders.map(o=>o.status+o.id).join(',')!==prev){renderStats();renderList();}
  toast('Дані оновлено');
}
function startRefresh(){
  if(refreshTimer)clearInterval(refreshTimer);
  refreshTimer=setInterval(async()=>{
    if(!role)return;
    const prev=orders.map(o=>o.status+o.id).join(',');
    await loadData();
    if(orders.map(o=>o.status+o.id).join(',')!==prev){renderStats();renderList();}
  },30000);
}

function ts(){return new Date().toLocaleString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function genNum(){return `ORD-${new Date().getFullYear()}-${String(ctr++).padStart(3,'0')}`;}
function sv(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setRbs(){['rb1','rb2','rb3'].forEach(id=>{const e=document.getElementById(id);if(e){e.textContent=role==='hybro'?'HYBRO':'Виконавець';e.className='rb rb-'+role;}});}
function updHint(){const e=document.getElementById('pinHint');if(e)e.textContent=`HYBRO: ${PINS.hybro} · Виконавець: ${PINS.exec}`;}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' err':'')+' show';setTimeout(()=>t.classList.remove('show'),2800);}

function modal(title,body,hasInput,ph,okLabel,okCls,cb){
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mBody').textContent=body;
  const inp=document.getElementById('mInput');
  if(hasInput){inp.style.display='';inp.placeholder=ph||'';inp.value='';setTimeout(()=>inp.focus(),50);}
  else inp.style.display='none';
  const btns=document.getElementById('mBtns');
  btns.innerHTML=`<button class="btn" id="mCancelBtn">Скасувати</button><button class="btn ${okCls||'btn-p'}" id="mOkBtn">${okLabel}</button>`;
  document.getElementById('mCancelBtn').addEventListener('click',mClose);
  document.getElementById('mOkBtn').addEventListener('click',()=>{
    const v=document.getElementById('mInput').value.trim();
    mClose();
    if(cb) cb(v);
  });
  document.getElementById('mOverlay').classList.add('open');
}
function mClose(){document.getElementById('mOverlay').classList.remove('open');}

async function doLogin(){
  const r=document.getElementById('lRole').value,p=document.getElementById('lPin').value;
  document.getElementById('lErr').style.display='none';
  document.getElementById('loadMsg').style.display='block';
  await loadData();
  document.getElementById('loadMsg').style.display='none';

  role=r;document.getElementById('lPin').value='';setRbs();

  document.getElementById('btnSet').style.display=r==='hybro'?'':'none';

}

function renderStats(){
  const vis=orders.filter(o=>role==='hybro'||o.status!=='draft');
  const c={};vis.forEach(o=>c[o.status]=(c[o.status]||0)+1);
  document.getElementById('statsRow').innerHTML=`
    <div class="sc"><div class="sl">Всього</div><div class="sv">${vis.length}</div></div>
    <div class="sc"><div class="sl">${role==='exec'?'Отримано':'Надіслано'}</div><div class="sv" style="color:var(--blue)">${c.sent||0}</div></div>
    <div class="sc"><div class="sl">Погоджено</div><div class="sv" style="color:var(--green)">${c.approved||0}</div></div>`;
}
function renderList(){
  const optSent=document.getElementById('optSent');
  if(optSent) optSent.textContent=role==='exec'?'Отримано':'Надіслано';
  const q=(document.getElementById('fSearch').value||'').toLowerCase();
  const st=document.getElementById('fStatus').value;
  let list=orders.filter(o=>{
    if(role==='exec'&&o.status==='draft')return false;
    if(st&&o.status!==st)return false;
    if(q&&!o.num.toLowerCase().includes(q))return false;
    return true;
  });
  const el=document.getElementById('listEl');
  if(!list.length){el.innerHTML='<div class="empty">Замовлень не знайдено</div>';return;}
  el.innerHTML=list.map(o=>{
    const total=o.items.reduce((s,i)=>s+i.qty,0);
    const hi=(role==='exec'&&o.status==='sent')||(role==='hybro'&&o.status==='approved');
    const copy=o.copiedFrom?`<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:var(--blue-bg);color:var(--blue-text);margin-left:5px">копія</span>`:'';
    const btns=role==='hybro'
      ? o.status==='draft'
        ?`<div style="display:flex;gap:6px;margin-top:8px" onclick="event.stopPropagation()">
            <button class="btn btn-p btn-xs" onclick="openOrder('${o.id}')">Відкрити</button>
            <button class="btn btn-xs" onclick="dupFromList('${o.id}')">Дублювати</button>
            <button class="btn btn-xs btn-d" onclick="delOrder('${o.id}')">Видалити</button>
          </div>`
        :`<div style="display:flex;gap:6px;margin-top:8px" onclick="event.stopPropagation()">
            <button class="btn btn-xs" onclick="dupFromList('${o.id}')">Дублювати</button>
            <button class="btn btn-xs btn-d" onclick="delOrder('${o.id}')">Видалити</button>
          </div>`
      :`<div style="display:flex;gap:6px;margin-top:8px" onclick="event.stopPropagation()"></div>`;
    return `<div class="card oc" style="${hi?'border-color:var(--blue);':''}" onclick="openOrder('${o.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
        <div><span style="font-size:14px;font-weight:500;font-family:var(--mono)">${o.num}</span>${copy}</div>
        <span class="spill ${SCL[o.status]}">${slbl(o.status)}</span>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-top:5px">Дата: ${o.date}${o.deadline?' · Термін: '+o.deadline:''} · Позицій: ${o.items.length}${total?' · '+total+' шт.':''}</div>
      ${btns}</div>`;
  }).join('');
}
function delOrder(id){
  const o=orders.find(x=>x.id===id);
  if(!o) return;
  const label=o.status==='draft'?'чернетку':'замовлення';
  modal(`Видалити ${label}?`,`Замовлення ${o.num} буде видалено назавжди.`,false,'','Видалити','btn-d',()=>{
    orders=orders.filter(x=>x.id!==id);save();renderStats();renderList();toast(`${o.num} видалено`);
  });
}
function dupFromList(id){const o=orders.find(x=>x.id===id);if(o)doDup(o);}
function doDup(src){
  const num=genNum();
  const o={id:'o'+Date.now(),num,date:new Date().toLocaleDateString('uk-UA'),deadline:src.deadline||'',status:'draft',items:src.items.map(i=>({...i})),editNote:'',copiedFrom:src.num};
  orders.unshift(o);save();cur=o;renderOrder();sv('vOrder');toast(`Копія → ${num}`);
}
function newOrder(){
  const o={id:'o'+Date.now(),num:genNum(),date:new Date().toLocaleDateString('uk-UA'),deadline:'',status:'draft',items:[],editNote:'',copiedFrom:''};
  orders.unshift(o);save();cur=o;renderOrder();sv('vOrder');
}
function openOrder(id){cur=orders.find(o=>o.id===id);if(!cur)return;renderOrder();sv('vOrder');}
function goList(){renderStats();renderList();sv('vMain');}
function dupCur(){if(cur)doDup(cur);}

function renderOrder(){
  const o=cur;
  document.getElementById('oNum').textContent=o.num;
  const sb=document.getElementById('oSt');sb.textContent=slbl(o.status);sb.className='spill '+SCL[o.status];

  document.getElementById('oMeta').innerHTML=`
    <span style="font-size:12px;color:var(--text2)">Дата: <b style="font-weight:500;color:var(--text)">${o.date}</b></span>
    <span style="font-size:12px;color:var(--text2)">Термін: <b style="font-weight:500;color:var(--text)">${o.deadline||'—'}</b></span>
    <span style="font-size:12px;color:var(--text2)">Позицій: <b style="font-weight:500;color:var(--text)">${o.items.length}</b></span>
    <span style="font-size:12px;color:var(--text2)">Кількість: <b style="font-weight:500;color:var(--text)">${total} шт.</b></span>`;
  document.getElementById('phHdr').innerHTML=`
    <div style="display:flex;justify-content:space-between">
      <div><div style="font-size:20px;font-weight:500;letter-spacing:.06em">HYBRO</div><div style="font-size:12px;color:#666;margin-top:2px">Замовлення на виробництво</div></div>

        <div style="font-size:16px;font-weight:500;font-family:monospace">${o.num}</div>
        <div>Дата: ${o.date}</div><div>Термін: ${o.deadline||'—'}</div><div>Статус: ${slbl(o.status)}</div>
      </div>
    </div>`;
  document.getElementById('oAct2').innerHTML=role==='hybro'?`<button class="btn btn-sm btn-d" onclick="delOrder('${o.id}');goList()">Видалити</button>`:'';
  renderItems();renderAct();
}

function canEdit(){return(role==='hybro'&&['draft','approved','accepted'].includes(cur.status))||(role==='exec'&&cur.status==='sent');}

function renderItems(){
  const o=cur,edit=canEdit(),add=role==='hybro'&&['draft','approved','accepted'].includes(o.status);
  let h='';
  if(o.status==='accepted'&&role==='hybro'&&!o._editingAccepted)
    h+=`<div class="banner banner-amber">Замовлення прийнято. <button class="btn btn-xs btn-a" onclick="editAccepted()">Редагувати</button></div>`;
  if(o.copiedFrom)
    h+=`<div class="banner banner-blue">Скопійовано з ${o.copiedFrom} — перевірте позиції і термін.</div>`;
  if(role==='hybro'&&edit)
    h+=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:13px;flex-wrap:wrap">
      <span style="font-size:12px;color:var(--text2)">Термін виконання:</span>
      <div class="cal-wrap"><input type="text" id="dlInp" value="${o.deadline||''}" placeholder="оберіть дату" style="width:148px;cursor:pointer" readonly onclick="openCal(event)"></div>
      ${o.deadline?`<button class="btn btn-xs btn-d" onclick="setDl('')">✕</button>`:''}
    </div>`;
  if(role==='exec'&&o.status==='sent')
    h+=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:13px;flex-wrap:wrap">
      <span style="font-size:12px;color:var(--text2)">Дата виготовлення:</span>
      <div class="cal-wrap"><input type="text" id="dlInp" value="${o.deadline||''}" placeholder="оберіть дату" style="width:148px;cursor:pointer" readonly onclick="openCal(event)"></div>
      ${o.deadline?`<button class="btn btn-xs btn-d" onclick="setDl('')">✕</button>`:''}
    </div>`;
  if(!o.items.length){h+='<div class="empty">Позиції не додані — скористайтесь каталогом нижче</div>';}
  else{
    const showEdit=edit&&role==='hybro';
    h+=`<div style="overflow-x:auto"><table class="tbl"><thead><tr>
      <th style="width:28px">#</th><th style="width:70px">Арт.</th><th>Назва</th>
      <th style="width:70px">К-сть</th><th>Примітка</th>${showEdit?'<th style="width:36px"></th>':''}
    </tr></thead><tbody>`;
    o.items.forEach((it,i)=>{
      if(showEdit) h+=`<tr><td>${i+1}</td><td><span class="mono" style="font-size:11px">${it.a}</span></td>
        <td style="font-size:12px">${it.n}${it.c?' '+it.c:''}</td>
        <td><input type="number" value="${it.qty}" min="1" style="width:60px" onchange="chQty(${i},this.value)"></td>
        <td><input type="text" value="${it.note||''}" placeholder="—" style="width:100%;max-width:220px" onchange="chNote(${i},this.value)"></td>
        <td><button class="btn btn-xs btn-d" onclick="rmItem(${i})">✕</button></td></tr>`;
      else h+=`<tr><td>${i+1}</td><td><span class="mono" style="font-size:11px">${it.a}</span></td>
        <td style="font-size:12px">${it.n}${it.c?' '+it.c:''}</td>
        <td>${it.qty}</td><td style="font-size:12px;color:var(--text2)">${it.note||'—'}</td></tr>`;
    });
    const total=o.items.reduce((s,i)=>s+i.qty,0);
    h+=`</tbody><tfoot><tr><td colspan="3" style="font-size:12px;color:var(--text2)">Разом позицій: ${o.items.length}</td>
      <td>${total} шт.</td><td${showEdit?' colspan="2"':''}></td></tr></tfoot></table></div>`;
  }
  if(add) h+=`<div style="border-top:1px solid var(--border);padding-top:14px;margin-top:14px">
    <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:9px">Каталог продуктів</div>
    <input type="text" id="catQ" placeholder="Пошук за назвою або артикулом..." style="width:100%;margin-bottom:10px" oninput="renderCat()">
    <div id="catEl"></div></div>`;
  document.getElementById('oItems').innerHTML=h;
  if(add)renderCat();
}
function editAccepted(){
  modal('Редагування замовлення','Ви збираєтесь внести зміни в прийняте замовлення.',false,'','Редагувати','btn-a',()=>{cur._editingAccepted=true;cur.editNote='редаговано';save();renderItems();});
}
function addItem(a,n,c){const ex=cur.items.find(i=>i.a===a);if(ex)ex.qty++;else cur.items.push({a,n,c,qty:1,note:''});save();renderItems();renderOrder();}
function rmItem(i){cur.items.splice(i,1);save();renderItems();renderOrder();}
function chQty(i,v){cur.items[i].qty=Math.max(1,parseInt(v)||1);save();}
function chNote(i,v){cur.items[i].note=v;save();}
function setDl(v){cur.deadline=v;save();renderOrder();}

function doPrint(){
  try { window.print(); }
  catch(e) {
    try { top.print(); }
    catch(e2) { alert('Для друку використайте Ctrl+P (або Cmd+P на Mac)'); }
  }
}
function chStatus(ns){cur.status=ns;if(ns!=='accepted')cur._editingAccepted=false;save();renderOrder();renderStats();}
function renderAct(){
  const o=cur;let h='';
  if(role==='hybro'){
    if(o.status==='draft') h+=o.items.length?`<button class="btn btn-p" onclick="chStatus('sent')">Відправити виконавцю</button>`:`<span style="font-size:12px;color:var(--text2)">Додайте позиції перед відправкою</span>`;
    if(o.status==='sent') h+=`<span style="font-size:12px;color:var(--text2)">Очікуємо погодження від виконавця</span>`;
    if(o.status==='approved') h+=`<button class="btn btn-p" onclick="chStatus('accepted')">Прийняти замовлення</button>`;
    if(o.status==='accepted') h+=`<span style="font-size:13px;color:#0F6E56;font-weight:500">Замовлення прийнято</span>`;
    if(o.status==='cancelled') h+=`<button class="btn" onclick="chStatus('draft')">Відновити як чернетку</button>`;
  }
  if(role==='exec'){
    if(o.status==='sent'){
      h+=`<button class="btn btn-g" onclick="execApprove()">Погодити</button>`;
      h+=`<span style="font-size:12px;color:var(--text2);align-self:center">Змінити дату можна вище перед погодженням</span>`;
    }
    if(o.status==='approved'||o.status==='accepted') h+=`<span style="font-size:13px;color:#0F6E56;font-weight:500">Замовлення погоджено</span>`;
  }
  document.getElementById('oAct').innerHTML=h;
}
function execApprove(){modal('Погодити замовлення','Підтверджуєте дату виконання і склад замовлення?',false,'','Погодити','btn-g',()=>{chStatus('approved');goList();});}

let openGroup=null;
function toggleGroup(g){openGroup=openGroup===g?null:g;renderCat();}
function renderCat(){
  const q=(document.getElementById('catQ')?.value||'').toLowerCase(),isSearch=q.length>0;
  let h='',any=false;
  PRODS.forEach(g=>{
    const f=g.items.filter(p=>(p.n+p.c+p.a).toLowerCase().includes(q));
    if(!f.length)return;
    any=true;
    const open=isSearch||openGroup===g.g,gk=g.g.replace(/'/g,"\\'");
    h+=`<div class="acc-group"><div class="acc-hdr${open?' open':''}" onclick="toggleGroup('${gk}')">
      <div style="display:flex;align-items:center;gap:4px"><span class="acc-title">${g.g}</span><span class="acc-meta">${f.length} позицій</span></div>
      <span class="acc-arrow">▼</span></div>
      <div class="acc-body${open?' open':''}">`;
    f.forEach(p=>{h+=`<div class="pr-row">
      <div><div style="font-size:13px">${p.n}${p.c?' '+p.c:''}</div><div class="mono" style="font-size:11px;color:var(--text2)">${p.a}</div></div>
      <button class="pr-add" onclick="addItem('${p.a}','${p.n.replace(/'/g,"\\'")}','${p.c}')">+ Додати</button>
    </div>`;});
    h+=`</div></div>`;
  });
  const el=document.getElementById('catEl');
  if(el)el.innerHTML=any?h:'<div style="font-size:13px;color:var(--text2)">Нічого не знайдено</div>';
}

const MONS=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const DOWS=['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];
let calSt={y:new Date().getFullYear(),m:new Date().getMonth()},calInpId=null,calOut=null;
function parseD(s){if(!s)return null;const p=s.split('.');if(p.length>=2){const d=new Date(p[2]?+p[2]:new Date().getFullYear(),+p[1]-1,+p[0]);if(!isNaN(d.getTime()))return d;}return null;}
function fmtD(d){return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();}
function openCal(e){
  e.stopPropagation();
  const inp=document.getElementById('dlInp'),pop=document.getElementById('calGlobal');
  if(!inp||!pop)return;
  calInpId='dlInp';
  const b=parseD(inp.value)||new Date();calSt={y:b.getFullYear(),m:b.getMonth()};
  drawCal();pop.classList.add('open');
  const r=inp.getBoundingClientRect();
  let top=r.bottom+6,left=r.left;
  if(left+252>window.innerWidth-8)left=window.innerWidth-260;
  if(top+295>window.innerHeight-8)top=r.top-295-6;
  pop.style.top=top+'px';pop.style.left=left+'px';
  if(calOut)document.removeEventListener('click',calOut);
  calOut=ev=>{if(!pop.contains(ev.target)&&ev.target!==inp){pop.classList.remove('open');document.removeEventListener('click',calOut);calOut=null;}};
  setTimeout(()=>document.addEventListener('click',calOut),10);
}
function drawCal(){
  const pop=document.getElementById('calGlobal'),inp=document.getElementById(calInpId);
  const sel=parseD(inp?inp.value:''),tod=new Date();tod.setHours(0,0,0,0);
  const first=new Date(calSt.y,calSt.m,1),last=new Date(calSt.y,calSt.m+1,0);
  let sd=first.getDay()-1;if(sd<0)sd=6;
  let h=`<div class="cal-nav"><button class="cal-nav-btn" data-a="p">‹</button><span class="cal-month">${MONS[calSt.m]} ${calSt.y}</span><button class="cal-nav-btn" data-a="n">›</button></div><div class="cal-grid">`;
  DOWS.forEach((d,i)=>{h+=`<div class="cal-dow${i>=5?' we':''}">${d}</div>`;});
  for(let i=0;i<sd;i++)h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(calSt.y,calSt.m,d),dow=dt.getDay(),we=dow===0||dow===6;
    h+=`<div class="cal-day${we?' we':''}${dt.getTime()===tod.getTime()?' today':''}${sel&&dt.getTime()===sel.getTime()?' sel':''}" data-d="${fmtD(dt)}">${d}</div>`;
  }
  h+=`</div><button class="cal-today-btn" data-a="t">Сьогодні</button>`;
  pop.innerHTML=h;
  pop.onclick=e=>{
    e.stopPropagation();
    const a=e.target.dataset.a,d=e.target.dataset.d;
    if(a==='p'){calSt.m--;if(calSt.m<0){calSt.m=11;calSt.y--;}drawCal();}
    else if(a==='n'){calSt.m++;if(calSt.m>11){calSt.m=0;calSt.y++;}drawCal();}
    else if(a==='t'){const t=new Date();calSt={y:t.getFullYear(),m:t.getMonth()};drawCal();}
    else if(d){const inp=document.getElementById(calInpId);if(inp)inp.value=d;pop.classList.remove('open');if(calOut){document.removeEventListener('click',calOut);calOut=null;}setDl(d);}
  };
}

function openSettings(){renderPins();sv('vSettings');}
function closeSettings(){renderStats();renderList();sv('vMain');}
function renderPins(){
  document.getElementById('pinForms').innerHTML=`
    <div style="margin-bottom:18px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)">PIN для HYBRO</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="password" id="pH1" placeholder="Поточний PIN" maxlength="6" style="width:135px">
        <input type="password" id="pH2" placeholder="Новий PIN" maxlength="6" style="width:135px">
        <button class="btn btn-sm btn-p" onclick="chPin('hybro')">Змінити</button>
      </div>
    </div>
    <div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)">PIN для Виконавця</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="password" id="pE1" placeholder="Поточний PIN" maxlength="6" style="width:135px">
        <input type="password" id="pE2" placeholder="Новий PIN" maxlength="6" style="width:135px">
        <button class="btn btn-sm btn-p" onclick="chPin('exec')">Змінити</button>
      </div>
    </div>`;
  document.getElementById('pinMsg').style.display='none';
}
function chPin(r){
  const c=document.getElementById(r==='hybro'?'pH1':'pE1').value;
  const n=document.getElementById(r==='hybro'?'pH2':'pE2').value;
  const msg=document.getElementById('pinMsg');
  if(c!==PINS[r]){msg.style.display='block';msg.style.color='var(--red)';msg.textContent='Невірний поточний PIN';return;}
  if(!n||n.length<4){msg.style.display='block';msg.style.color='var(--red)';msg.textContent='Мінімум 4 символи';return;}
  PINS[r]=n;save();updHint();
  msg.style.display='block';msg.style.color='var(--green)';msg.textContent=`PIN для ${r==='hybro'?'HYBRO':'Виконавця'} змінено`;
  document.getElementById(r==='hybro'?'pH1':'pE1').value='';
  document.getElementById(r==='hybro'?'pH2':'pE2').value='';
  toast('PIN-код змінено');
}

loadData(true);

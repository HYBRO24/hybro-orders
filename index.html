<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYBRO Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F3;
  --bg2: #EFEEE9;
  --bg3: #E5E4DE;
  --white: #FFFFFF;
  --text: #1A1A18;
  --text2: #6B6B66;
  --text3: #9E9E99;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.18);
  --blue: #185FA5;
  --blue-bg: #E6F1FB;
  --blue-text: #0C447C;
  --green: #3B6D11;
  --green-bg: #EAF3DE;
  --green-text: #27500A;
  --amber: #854F0B;
  --amber-bg: #FAEEDA;
  --amber-text: #633806;
  --red: #A32D2D;
  --red-bg: #FCEBEB;
  --red-text: #791F1F;
  --teal-bg: #9FE1CB;
  --teal-text: #04342C;
  --gray-bg: #F1EFE8;
  --gray-text: #444441;
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
.view { display: none; min-height: 100vh; }
.view.active { display: block; }

/* Topbar */
.topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 11px 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 13px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--text); }
.rb { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.rb-hybro { background: var(--blue-bg); color: var(--blue-text); }
.rb-exec { background: var(--green-bg); color: var(--green-text); }

/* Buttons */
.btn { font-family: var(--font); font-size: 12px; padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--white); color: var(--text); cursor: pointer; transition: background .15s; }
.btn:hover { background: var(--bg2); }
.btn:active { transform: scale(.98); }
.btn-p { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-p:hover { background: var(--blue-text); color: #fff; }
.btn-g { background: var(--green); color: #fff; border-color: var(--green); }
.btn-g:hover { background: var(--green-text); color: #fff; }
.btn-d { color: var(--red); border-color: #F09595; }
.btn-d:hover { background: var(--red-bg); }
.btn-a { background: var(--amber); color: #fff; border-color: var(--amber); }
.btn-a:hover { background: var(--amber-text); color: #fff; }
.btn-sm { font-size: 11px; padding: 4px 10px; }
.btn-xs { font-size: 11px; padding: 3px 8px; }

/* Status pills */
.spill { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap; display: inline-block; }
.s-draft { background: var(--gray-bg); color: var(--gray-text); }
.s-sent { background: var(--blue-bg); color: var(--blue-text); }
.s-review { background: var(--amber-bg); color: var(--amber-text); }
.s-approved { background: var(--green-bg); color: var(--green-text); }
.s-accepted { background: var(--teal-bg); color: var(--teal-text); }
.s-cancelled { background: var(--red-bg); color: var(--red-text); }

/* Cards */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); }
.oc { padding: 12px 16px; cursor: pointer; transition: border-color .15s; }
.oc:hover { border-color: var(--border2); }

/* Main layout */
.main { padding: 20px; max-width: 1100px; }

/* Stats grid */
.sg { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; margin-bottom: 16px; }
.sc { background: var(--bg2); border-radius: var(--radius); padding: 10px 13px; }
.sl { font-size: 11px; color: var(--text2); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .04em; }
.sv { font-size: 22px; font-weight: 500; }

/* Filter row */
.frow { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }

/* Order list */
.orders-list { display: flex; flex-direction: column; gap: 7px; }

/* Tables */
.tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
.tbl th { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text2); padding: 8px 8px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
.tbl td { font-size: 13px; padding: 8px 8px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--bg); }

/* Priority */
.ph { color: var(--red); font-size: 11px; font-weight: 500; }
.pm { color: var(--amber); font-size: 11px; font-weight: 500; }
.pl { color: var(--green); font-size: 11px; font-weight: 500; }

/* Tabs */
.tab-row { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; }
.tab { font-size: 13px; padding: 10px 14px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
.tab.active { color: var(--text); border-bottom-color: var(--blue); font-weight: 500; }
.tb { display: none; padding: 16px 20px; }
.tb.active { display: block; }

/* Log */
.log-e { padding: 10px 13px; margin-bottom: 8px; font-size: 13px; border-left: 3px solid transparent; }
.log-hybro { background: var(--blue-bg); border-left-color: var(--blue); }
.log-exec { background: var(--green-bg); border-left-color: var(--green); }
.log-sys { background: var(--bg2); border-left-color: var(--border2); }
.log-nm { font-weight: 500; font-size: 11px; margin-bottom: 2px; }
.log-hybro .log-nm { color: var(--blue); }
.log-exec .log-nm { color: var(--green); }
.log-sys .log-nm { color: var(--text2); }
.log-ts { font-size: 11px; color: var(--text3); margin-bottom: 3px; }

/* Actions row */
.act-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 13px 20px; border-top: 1px solid var(--border); align-items: center; }

/* Catalog */
.pr-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
.pr-row:last-child { border-bottom: none; }
.pr-add { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; cursor: pointer; color: var(--text2); font-family: var(--font); }
.pr-add:hover { background: var(--blue-bg); color: var(--blue-text); border-color: #85B7EB; }

/* Accordion catalog */
.acc-group { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; }
.acc-hdr { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px; cursor: pointer; background: var(--bg2); user-select: none; transition: background .15s; }
.acc-hdr:hover { background: var(--bg3); }
.acc-hdr.open { background: var(--blue-bg); }
.acc-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--text); }
.acc-hdr.open .acc-title { color: var(--blue-text); }
.acc-meta { font-size: 11px; color: var(--text2); margin-left: 8px; }
.acc-hdr.open .acc-meta { color: var(--blue-text); opacity: .7; }
.acc-arrow { font-size: 10px; color: var(--text2); transition: transform .2s; }
.acc-hdr.open .acc-arrow { transform: rotate(180deg); color: var(--blue-text); }
.acc-body { display: none; padding: 4px 13px 8px; }
.acc-body.open { display: block; }

/* Inputs */
input, select, textarea { font-family: var(--font); font-size: 13px; padding: 6px 9px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--white); color: var(--text); outline: none; }
input:focus, select:focus, textarea:focus { border-color: var(--blue); }
input[type=number] { width: 62px; }

/* Banners */
.banner { border-radius: var(--radius); padding: 10px 13px; font-size: 12px; margin-bottom: 13px; }
.banner-amber { background: var(--amber-bg); border: 1px solid #EF9F27; color: var(--amber-text); }
.banner-blue { background: var(--blue-bg); border: 1px solid #85B7EB; color: var(--blue-text); }
.banner-green { background: var(--green-bg); border: 1px solid #97C459; color: var(--green-text); }

/* Modal dialog */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 8000; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--white); border-radius: var(--radius-lg); padding: 24px; width: 100%; max-width: 380px; border: 1px solid var(--border); }
.modal-title { font-size: 14px; font-weight: 500; margin-bottom: 14px; color: var(--text); }
.modal-body { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
.modal-input { width: 100%; margin-bottom: 16px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

/* Calendar picker */
.cal-wrap { display: inline-block; }
#calGlobal { display: none; position: fixed; z-index: 9999; background: var(--white); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 12px; width: 252px; box-shadow: 0 6px 24px rgba(0,0,0,0.15); }
#calGlobal.open { display: block; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-nav-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text2); padding: 2px 6px; border-radius: var(--radius); font-family: var(--font); }
.cal-nav-btn:hover { background: var(--bg2); color: var(--text); }
.cal-month { font-size: 13px; font-weight: 500; color: var(--text); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 32px); gap: 0; justify-content: center; }
.cal-dow { font-size: 10px; text-align: center; color: var(--text2); padding: 4px 0; font-weight: 500; text-transform: uppercase; letter-spacing: .03em; width: 32px; }
.cal-dow.weekend { color: var(--red); }
.cal-day { font-size: 12px; text-align: center; padding: 6px 0; border-radius: var(--radius); cursor: pointer; color: var(--text); transition: background .1s; width: 32px; }
.cal-day:hover { background: var(--blue-bg); color: var(--blue-text); }
.cal-day.today { font-weight: 500; background: var(--bg2); }
.cal-day.selected { background: var(--blue); color: #fff; font-weight: 500; }
.cal-day.selected:hover { background: var(--blue-text); }
.cal-day.weekend { color: var(--red); }
.cal-day.weekend.selected { color: #fff; }
.cal-day.other-month { color: var(--text3); }
.cal-day.other-month.weekend { color: #F09595; }
.cal-day.empty { cursor: default; }
.cal-day.empty:hover { background: none; }
.cal-today-btn { width: 100%; margin-top: 8px; font-size: 11px; padding: 5px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; font-family: var(--font); }
.cal-today-btn:hover { background: var(--bg3); }

/* Summary table */
.sum-tbl { width: 100%; border-collapse: collapse; }
.sum-tbl th { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text2); padding: 7px 8px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
.sum-tbl td { font-size: 13px; padding: 7px 8px; border-bottom: 1px solid var(--border); color: var(--text); }
.sum-tbl tr:last-child td { border-bottom: none; }
.sum-g-row td { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; padding: 9px 8px 4px; border-bottom: 1px solid var(--border); background: var(--bg2); }

/* Toast */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #fff; font-size: 12px; padding: 9px 16px; border-radius: var(--radius); opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 9999; font-family: var(--font); }
.toast.err { background: var(--red); }
.toast.show { opacity: 1; }

/* Sync indicator */
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; }
.sync-dot.syncing { background: var(--amber); animation: pulse .8s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Login */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--bg); }
.login-card { width: 100%; max-width: 340px; }
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo-mark { font-size: 24px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; }
.login-logo-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* Print */
@media print {
  .topbar, .act-row, .tab-row, .frow, .sg, .no-print { display: none !important; }
  #tab-log { display: none !important; }
  .card { border: 1px solid #ccc !important; border-radius: 0 !important; box-shadow: none !important; }
  .ph-hdr { display: block !important; }
  .tb { display: block !important; }
  body { background: #fff; }
  .main { padding: 0; }
}
.ph-hdr { display: none; padding: 0 0 14px; border-bottom: 1px solid #ccc; margin-bottom: 14px; }

.empty { text-align: center; padding: 36px; color: var(--text2); font-size: 13px; }
.mono { font-family: var(--mono); }

/* Auto-refresh bar */
.refresh-bar { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="calGlobal"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <textarea class="modal-input" id="modalInput" rows="3" placeholder="" style="display:none;resize:none"></textarea>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="vLogin" class="view active">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-mark">HYBRO</div>
        <div class="login-logo-sub">Система замовлень на виробництво</div>
      </div>
      <div class="card" style="padding:24px">
        <div style="margin-bottom:14px">
          <div style="font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Роль</div>
          <select id="lRole" style="width:100%">
            <option value="">— оберіть роль —</option>
            <option value="hybro">HYBRO</option>
            <option value="exec">Виконавець</option>
          </select>
        </div>
        <div style="margin-bottom:20px">
          <div style="font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">PIN-код</div>
          <input type="password" id="lPin" maxlength="6" placeholder="••••" style="width:100%;text-align:center;font-size:22px;letter-spacing:.25em" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-p" style="width:100%;padding:9px" onclick="doLogin()">Увійти</button>
        <div id="lErr" style="font-size:12px;color:var(--red);text-align:center;margin-top:10px;display:none">Невірний PIN-код</div>
      </div>
      <div id="pinHint" style="text-align:center;margin-top:12px;font-size:11px;color:var(--text3)"></div>
      <div id="loadingMsg" style="text-align:center;margin-top:10px;font-size:12px;color:var(--text2);display:none">
        <span class="sync-dot syncing"></span> Завантаження даних...
      </div>
    </div>
  </div>
</div>

<!-- MAIN LIST -->
<div id="vMain" class="view">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="logo">HYBRO Orders</span>
      <span class="rb" id="rb1"></span>
      <div class="refresh-bar no-print">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncLbl">—</span>
      </div>
    </div>
    <div style="display:flex;gap:7px;align-items:center">
      <button class="btn btn-p btn-sm no-print" id="btnNew" onclick="newOrder()" style="display:none">+ Нове замовлення</button>
      <button class="btn btn-sm no-print" id="btnSettings" onclick="openSettings()" style="display:none">Налаштування</button>
      <button class="btn btn-sm no-print" onclick="forceSync()">Оновити</button>
      <button class="btn btn-sm no-print" onclick="doLogout()">Вийти</button>
    </div>
  </div>
  <div class="main">
    <div class="sg" id="statsRow"></div>
    <div class="frow">
      <input type="text" id="fSearch" placeholder="Пошук за номером..." style="width:175px" oninput="renderList()">
      <select id="fStatus" onchange="renderList()" style="width:158px">
        <option value="">Всі статуси</option>
        <option value="draft">Чернетка</option>
        <option value="sent">Відправлено</option>
        <option value="review">На коригуванні</option>
        <option value="approved">Погоджено</option>
        <option value="accepted">Прийнято</option>
        <option value="cancelled">Скасовано</option>
      </select>
      <select id="fSort" onchange="renderList()" style="width:148px">
        <option value="new">Спочатку нові</option>
        <option value="old">Спочатку старі</option>
        <option value="status">За статусом</option>
      </select>
    </div>
    <div class="orders-list" id="listEl"></div>
  </div>
</div>

<!-- ORDER DETAIL -->
<div id="vOrder" class="view">
  <div class="topbar no-print">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="goList()">← Назад</button>
      <span class="logo" id="oTitle"></span>
      <span class="spill" id="oSt"></span>
    </div>
    <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
      <span class="rb" id="rb2"></span>
      <button class="btn btn-sm no-print" id="btnDup" onclick="duplicateOrder()" style="display:none">Дублювати</button>
      <button class="btn btn-sm no-print" onclick="printOrder()">Друк / PDF</button>
      <button class="btn btn-sm no-print" onclick="doLogout()">Вийти</button>
    </div>
  </div>
  <div class="main">
    <div class="card">
      <div class="ph-hdr" id="phHdr"></div>
      <div style="padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div>
          <div style="font-size:16px;font-weight:500" id="oDTitle"></div>
          <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:7px" id="oMeta"></div>
        </div>
        <div id="oTopAct" style="display:flex;gap:7px;flex-wrap:wrap"></div>
      </div>
      <div class="tab-row no-print">
        <div class="tab active" onclick="swTab('items',this)">Позиції</div>
        <div class="tab" onclick="swTab('sum',this)">Підсумок</div>
        <div class="tab" onclick="swTab('log',this)">Журнал змін</div>
      </div>
      <div id="tab-items" class="tb active"></div>
      <div id="tab-sum" class="tb"></div>
      <div id="tab-log" class="tb"></div>
      <div class="act-row no-print" id="actRow"></div>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div id="vSettings" class="view">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-sm" onclick="closeSettings()">← Назад</button>
      <span class="logo">Налаштування</span>
    </div>
    <span class="rb" id="rb3"></span>
  </div>
  <div class="main">
    <div class="card" style="padding:22px;max-width:440px">
      <div style="font-size:14px;font-weight:500;margin-bottom:18px">Зміна PIN-кодів</div>
      <div id="pinForms"></div>
      <div id="pinMsg" style="font-size:12px;margin-top:12px;display:none"></div>
    </div>
  </div>
</div>

<script>

const SCL  = {draft:'s-draft',sent:'s-sent',review:'s-review',approved:'s-approved',accepted:'s-accepted',cancelled:'s-cancelled'};

let role = '', cur = null, orders = [], ctr = 1;

// ── JSONbin API ──────────────────────────────────────────────
async function apiGet() {
  const r = await fetch(API_URL + '/latest', {
    headers: {'X-Master-Key': API_KEY}
  });
  if (!r.ok) throw new Error('GET failed: ' + r.status);
  const j = await r.json();
  return j.record;
}

async function apiPut(data) {
  const r = await fetch(API_URL, {
    method: 'PUT',
    headers: {'X-Master-Key': API_KEY, 'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('PUT failed: ' + r.status);
  return true;
}

function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLbl');
  if (!dot || !lbl) return;
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  if (state === 'syncing') lbl.textContent = 'Синхронізація...';
  else if (state === 'error') lbl.textContent = 'Помилка зв\'язку';
  else if (lastSyncTime) lbl.textContent = 'Оновлено ' + lastSyncTime;
  else lbl.textContent = 'Готово';
}

async function loadData(showSpinner = false) {
  if (showSpinner) document.getElementById('loadingMsg').style.display = 'block';
  try {
    const rec = await apiGet();
    if (rec && rec.orders) orders = rec.orders;
    if (rec && rec.ctr) ctr = rec.ctr;
    if (rec && rec.pins) PINS = rec.pins;
    lastSyncTime = new Date().toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'});
    setSyncState('ok');
  } catch(e) {
    setSyncState('error');
    showToast('Помилка завантаження даних', true);
  }
  if (showSpinner) document.getElementById('loadingMsg').style.display = 'none';
  updHint();
}

async function saveData() {
  setSyncState('syncing');
  try {
    await apiPut({orders, ctr, pins: PINS});
    lastSyncTime = new Date().toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'});
    setSyncState('ok');
  } catch(e) {
    setSyncState('error');
    showToast('Помилка збереження!', true);
  }
}

async function forceSync() {
  setSyncState('syncing');
  await loadData();
  if (document.getElementById('vMain').classList.contains('active')) {
    renderStats(); renderList();
  }
  showToast('Дані оновлено');
}

function startAutoRefresh() {
  stopAutoRefresh();
  autoRefreshTimer = setInterval(async () => {
    if (!role) return;
    const prevCount = orders.length;
    const prevStatuses = orders.map(o => o.status).join(',');
    await loadData();
    const newCount = orders.length;
    const newStatuses = orders.map(o => o.status).join(',');
    if (newCount !== prevCount || prevStatuses !== newStatuses) {
      renderStats(); renderList();
      if (newCount > prevCount) {
        const diff = newCount - prevCount;
        showToast(`Нових замовлень: ${diff}`);
        document.title = `(${diff}) HYBRO Orders`;
        setTimeout(() => document.title = 'HYBRO Orders', 5000);
      }
    }
  }, 30000);
}

function stopAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
}

// ── Helpers ──────────────────────────────────────────────────
function ts() { return new Date().toLocaleString('uk-UA', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function genNum() { const y = new Date().getFullYear(); return `ORD-${y}-${String(ctr++).padStart(3,'0')}`; }
function sv(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function setRbs() { ['rb1','rb2','rb3'].forEach(id => { const el = document.getElementById(id); if (el) { el.textContent = role === 'hybro' ? 'HYBRO' : 'Виконавець'; el.className = 'rb rb-' + role; } }); }
function updHint() { const el = document.getElementById('pinHint'); if (el) el.textContent = `HYBRO: ${PINS.hybro} · Виконавець: ${PINS.exec}`; }

function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '') + ' show';
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Auth ──────────────────────────────────────────────────────
async function doLogin() {
  const r = document.getElementById('lRole').value;
  const p = document.getElementById('lPin').value;
  document.getElementById('lErr').style.display = 'none';
  document.getElementById('loadingMsg').style.display = 'block';
  await loadData();
  document.getElementById('loadingMsg').style.display = 'none';
  if (!r || p !== PINS[r]) { document.getElementById('lErr').style.display = 'block'; return; }
  role = r;
  document.getElementById('lPin').value = '';
  setRbs();
  document.getElementById('btnNew').style.display = r === 'hybro' ? '' : 'none';
  document.getElementById('btnSettings').style.display = r === 'hybro' ? '' : 'none';
  renderStats(); renderList();
  sv('vMain');
  startAutoRefresh();
}

function doLogout() {
  role = ''; stopAutoRefresh();
  document.title = 'HYBRO Orders';
  sv('vLogin');
}

// ── List view ─────────────────────────────────────────────────
function renderStats() {
  const vis = orders.filter(o => role === 'hybro' || o.status !== 'draft');
  const c = {};
  vis.forEach(o => c[o.status] = (c[o.status] || 0) + 1);
  document.getElementById('statsRow').innerHTML = `
    <div class="sc"><div class="sl">Всього</div><div class="sv">${vis.length}</div></div>
    <div class="sc"><div class="sl">Очікують</div><div class="sv" style="color:var(--blue)">${(c.sent||0)+(c.review||0)}</div></div>
    <div class="sc"><div class="sl">Погоджено</div><div class="sv" style="color:var(--green)">${c.approved||0}</div></div>
    <div class="sc"><div class="sl">Прийнято</div><div class="sv" style="color:#0F6E56">${c.accepted||0}</div></div>
    ${role==='hybro'?`<div class="sc"><div class="sl">Чернетки</div><div class="sv" style="color:var(--text2)">${c.draft||0}</div></div>`:''}
  `;
}

function renderList() {
  const q = (document.getElementById('fSearch').value || '').toLowerCase();
  const st = document.getElementById('fStatus').value;
  const srt = document.getElementById('fSort').value;
  let list = orders.filter(o => {
    if (role === 'exec' && o.status === 'draft') return false;
    if (st && o.status !== st) return false;
    if (q && !o.num.toLowerCase().includes(q)) return false;
    return true;
  });
  if (srt === 'old') list = [...list].reverse();
  else if (srt === 'status') {
    const ord = {sent:0,review:1,approved:2,draft:3,accepted:4,cancelled:5};
    list = [...list].sort((a,b) => (ord[a.status]||9)-(ord[b.status]||9));
  }
  const el = document.getElementById('listEl');
  if (!list.length) { el.innerHTML = '<div class="empty">Замовлень не знайдено</div>'; return; }
  el.innerHTML = list.map(o => {
    const total = o.items.reduce((s,i) => s+i.qty, 0);
    const editMark = o.editNote ? `<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:var(--amber-bg);color:var(--amber-text);margin-left:5px">ред.</span>` : '';
    const copyMark = o.copiedFrom ? `<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:var(--blue-bg);color:var(--blue-text);margin-left:5px">копія</span>` : '';
    const needsAttention = (role==='exec' && (o.status==='sent')) || (role==='hybro' && (o.status==='review'||o.status==='approved'));
    const accentBorder = needsAttention ? 'border-color:#185FA5;' : '';
    const draftActs = role==='hybro' && o.status==='draft'
      ? `<div style="display:flex;gap:6px;margin-top:8px" onclick="event.stopPropagation()">
          <button class="btn btn-p btn-xs" onclick="openOrder('${o.id}')">Відкрити</button>
          <button class="btn btn-xs" onclick="dupFromList('${o.id}')">Дублювати</button>
          <button class="btn btn-xs btn-d" onclick="deleteOrder('${o.id}')">Видалити</button>
        </div>`
      : `<div style="display:flex;gap:6px;margin-top:8px" onclick="event.stopPropagation()">
          <button class="btn btn-xs" onclick="dupFromList('${o.id}')">Дублювати</button>
        </div>`;
    return `<div class="card oc" style="${accentBorder}" onclick="openOrder('${o.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">
          <span style="font-size:14px;font-weight:500;font-family:var(--mono)">${o.num}</span>${editMark}${copyMark}
        </div>
        <span class="spill ${SCL[o.status]}">${SLBL[o.status]}</span>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-top:5px">
        Дата: ${o.date}${o.deadline?' · Термін: '+o.deadline:''} · Позицій: ${o.items.length}${total?' · '+total+' шт.':''}
      </div>
      ${draftActs}
    </div>`;
  }).join('');
}

function deleteOrder(id) {
  const o = orders.find(x => x.id === id);
  if (!o || o.status !== 'draft') return;
  showModal(
    'Видалити чернетку?',
    `Замовлення ${o.num} буде видалено назавжди. Цю дію не можна скасувати.`,
    false, '',
    'Видалити', 'btn-d',
    () => {
      orders = orders.filter(x => x.id !== id);
      saveData(); renderStats(); renderList();
      showToast(`Чернетку ${o.num} видалено`);
    },
    'Скасувати'
  );
}

function dupFromList(id) { const o = orders.find(x => x.id === id); if (o) doDuplicate(o); }

function doDuplicate(src) {
  const newNum = genNum();
  const o = {
    id: 'o' + Date.now(), num: newNum,
    date: new Date().toLocaleDateString('uk-UA'),
    deadline: src.deadline || '', status: 'draft',
    items: src.items.map(it => ({...it})),
    log: [{role:'hybro',name:'HYBRO',time:ts(),text:`Замовлення створено як копія ${src.num}`}],
    editNote: '', copiedFrom: src.num
  };
  orders.unshift(o);
  saveData();
  cur = o; renderOrderView(); sv('vOrder');
  showToast(`Створено копію → ${newNum}`);
}

  }
  if (add) {
    h += `<div style="border-top:1px solid var(--border);padding-top:14px;margin-top:14px">
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:9px">Каталог продуктів</div>
      <input type="text" id="catQ" placeholder="Пошук за назвою або артикулом..." style="width:100%;margin-bottom:10px" oninput="renderCat()">
      <div id="catEl"></div>
    </div>`;
  }
  document.getElementById('tab-items').innerHTML = h;
  if (add) renderCat();
}

// ── Calendar picker (one global popup) ───────────────────────
const UA_MONTHS = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const UA_DOW = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];
let calState = {year: new Date().getFullYear(), month: new Date().getMonth()};
let calCtx = {type: null, idx: null, inputId: null};
let calOutside = null;

function parseStoredDate(str) {
  if (!str) return null;
  const p = str.split('.');
  if (p.length >= 2) {
    const dt = new Date(p[2] ? parseInt(p[2]) : new Date().getFullYear(), parseInt(p[1])-1, parseInt(p[0]));
    if (!isNaN(dt.getTime())) return dt;
  }
  return null;
}

function fmtDate(dt) {
  return String(dt.getDate()).padStart(2,'0') + '.' + String(dt.getMonth()+1).padStart(2,'0') + '.' + dt.getFullYear();
}

function openCal(event, type, idx) {
  event.stopPropagation();
  const inputId = type === 'order' ? 'dlInput-order' : 'dlInput-' + idx;
  const inputEl = document.getElementById(inputId);
  const pop = document.getElementById('calGlobal');
  if (!inputEl || !pop) return;

  const existing = parseStoredDate(inputEl.value);
  const base = existing || new Date();
  calState = {year: base.getFullYear(), month: base.getMonth()};
  calCtx = {type, idx, inputId};

  renderCalMarkup();
  pop.classList.add('open');

  const rect = inputEl.getBoundingClientRect();
  let top = rect.bottom + 6, left = rect.left;
  if (left + 252 > window.innerWidth - 8) left = window.innerWidth - 260;
  if (top + 295 > window.innerHeight - 8) top = rect.top - 295 - 6;
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';

  if (calOutside) document.removeEventListener('click', calOutside);
  calOutside = function(e) {
    if (!pop.contains(e.target) && e.target !== inputEl) {
      pop.classList.remove('open');
      document.removeEventListener('click', calOutside);
      calOutside = null;
    }
  };
  setTimeout(() => document.addEventListener('click', calOutside), 10);
}

function renderCalMarkup() {
  const pop = document.getElementById('calGlobal');
  const inputEl = document.getElementById(calCtx.inputId);
  const selected = parseStoredDate(inputEl ? inputEl.value : '');
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(calState.year, calState.month, 1);
  const lastDay  = new Date(calState.year, calState.month + 1, 0);
  let startDow = firstDay.getDay() - 1; if (startDow < 0) startDow = 6;

  let h = `<div class="cal-nav">
    <button class="cal-nav-btn" data-action="prev">‹</button>
    <span class="cal-month">${UA_MONTHS[calState.month]} ${calState.year}</span>
    <button class="cal-nav-btn" data-action="next">›</button>
  </div><div class="cal-grid">`;
  UA_DOW.forEach((d,i) => { h += `<div class="cal-dow${i>=5?' weekend':''}">${d}</div>`; });
  for (let i = 0; i < startDow; i++) h += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dt = new Date(calState.year, calState.month, d);
    const dow = dt.getDay();
    const isWE = dow === 0 || dow === 6;
    const isTd = dt.getTime() === today.getTime();
    const isSel = selected && dt.getTime() === selected.getTime();
    let cls = 'cal-day' + (isWE?' weekend':'') + (isTd?' today':'') + (isSel?' selected':'');
    h += `<div class="${cls}" data-date="${fmtDate(dt)}">${d}</div>`;
  }
  h += `</div><button class="cal-today-btn" data-action="today">Сьогодні</button>`;
  pop.innerHTML = h;

  pop.onclick = function(e) {
    e.stopPropagation();
    const action = e.target.dataset.action;
    const date = e.target.dataset.date;
    if (action === 'prev') { calNav(-1); }
    else if (action === 'next') { calNav(1); }
    else if (action === 'today') { calGoToday(); }
    else if (date) { pickDate(date); }
  };
}

function calNav(dir) {
  calState.month += dir;
  if (calState.month > 11) { calState.month = 0; calState.year++; }
  if (calState.month < 0)  { calState.month = 11; calState.year--; }
  renderCalMarkup();
}

function calGoToday() {
  const t = new Date();
  calState = {year: t.getFullYear(), month: t.getMonth()};
  renderCalMarkup();
}

function pickDate(formatted) {
  const inputEl = document.getElementById(calCtx.inputId);
  if (inputEl) inputEl.value = formatted;
  const pop = document.getElementById('calGlobal');
  pop.classList.remove('open');
  if (calOutside) { document.removeEventListener('click', calOutside); calOutside = null; }
  if (calCtx.type === 'order') {
    chDeadline(formatted);
  } else {
    chF(parseInt(calCtx.idx), 'dl', formatted);
    renderLog();
  }
}


function startEditAccepted() {
  showModal(
    'Редагування прийнятого замовлення',
    'Вкажіть причину редагування — вона буде зафіксована в журналі.',
    true, 'Причина редагування...',
    'Розпочати редагування', 'btn-a',
    (reason) => {
      cur._editingAccepted = true;
      cur.editNote = reason || 'не вказано';
      addLog(`HYBRO розпочав редагування прийнятого замовлення. Причина: "${cur.editNote}"`);
      saveData(); renderItems(); renderLog();
    }
  );
}

let openGroup = null;

function toggleGroup(gName) {
  openGroup = openGroup === gName ? null : gName;
  renderCat();
}

function renderCat() {
  const q = (document.getElementById('catQ')?.value || '').toLowerCase();
  const isSearch = q.length > 0;
  let h = '';
  let anyFound = false;

  PRODS.forEach(g => {
    const f = g.items.filter(p => (p.n + p.c + p.a).toLowerCase().includes(q));
    if (!f.length) return;
    anyFound = true;

    const isOpen = isSearch || openGroup === g.g;
    const gKey = g.g.replace(/'/g, "\\'");

    h += `<div class="acc-group">
      <div class="acc-hdr${isOpen?' open':''}" onclick="toggleGroup('${gKey}')">
        <div style="display:flex;align-items:center;gap:4px">
          <span class="acc-title">${g.g}</span>
          <span class="acc-meta">${f.length} позицій</span>
        </div>
        <span class="acc-arrow">▼</span>
      </div>
      <div class="acc-body${isOpen?' open':''}">`;

    f.forEach(p => {
      h += `<div class="pr-row">
        <div>
          <div style="font-size:13px">${p.n}${p.c?' '+p.c:''}</div>
          <div class="mono" style="font-size:11px;color:var(--text2)">${p.a}</div>
        </div>
        <button class="pr-add" onclick="addItem('${p.a}','${p.n.replace(/'/g,"\\'")}','${p.c}')">+ Додати</button>
      </div>`;
    });

    h += `</div></div>`;
  });

  const el = document.getElementById('catEl');
  if (el) el.innerHTML = anyFound ? h : '<div style="font-size:13px;color:var(--text2)">Нічого не знайдено</div>';
}

function renderSum() {
  const o = cur;
  if (!o.items.length) { document.getElementById('tab-sum').innerHTML = '<div class="empty">Немає позицій</div>'; return; }
  const byGroup = {};
  o.items.forEach(it => {
    const grp = PRODS.find(g => g.items.some(p => p.a === it.a))?.g || 'Інше';
    if (!byGroup[grp]) byGroup[grp] = [];
    byGroup[grp].push(it);
  });
  const total = o.items.reduce((s,i) => s+i.qty, 0);
  let h = `<div style="font-size:13px;color:var(--text2);margin-bottom:14px">Загальна кількість: <b style="font-weight:500;color:var(--text)">${total} шт.</b> &nbsp;·&nbsp; Термін: <b style="font-weight:500;color:var(--text)">${o.deadline||'—'}</b></div>
  <table class="sum-tbl"><thead><tr><th>Артикул</th><th>Назва</th><th style="text-align:right;width:60px">К-сть</th><th style="width:90px">Пріоритет</th><th>Примітка</th></tr></thead><tbody>`;
  Object.entries(byGroup).forEach(([g, items]) => {
    const gt = items.reduce((s,i) => s+i.qty, 0);
    h += `<tr class="sum-g-row"><td colspan="5">${g} — ${gt} шт.</td></tr>`;
    items.forEach(it => {
      const pc = it.pr === 'Високий' ? 'ph' : it.pr === 'Середній' ? 'pm' : 'pl';
      h += `<tr>
        <td class="mono" style="font-size:11px">${it.a}</td>
        <td style="font-size:12px">${it.n}${it.c?' '+it.c:''}</td>
        <td style="text-align:right;font-weight:500">${it.qty}</td>
        <td><span class="${pc}">${it.pr||'Середній'}</span></td>
        <td style="font-size:12px;color:var(--text2)">${it.note||'—'}</td>
      </tr>`;
    });
  });
  h += '</tbody></table>';
  document.getElementById('tab-sum').innerHTML = h;
}

function addItem(a, n, c) {
  const ex = cur.items.find(i => i.a === a);
  if (ex) { ex.qty++; addLog(`Збільшено кількість: ${n}${c?' '+c:''} (${a}) → ${ex.qty} шт.`); }
  else { cur.items.push({a,n,c,qty:1,pr:'Середній',note:''}); addLog(`Додано: ${n}${c?' '+c:''} (арт. ${a})`); }
  saveData(); renderItems(); renderLog(); renderOrderView();
}

function rmItem(i) {
  const it = cur.items[i];
  addLog(`Видалено: ${it.n}${it.c?' '+it.c:''} (арт. ${it.a})`);
  cur.items.splice(i, 1);
  saveData(); renderItems(); renderLog(); renderOrderView();
}

function chF(i, f, v) {
  const it = cur.items[i]; const old = it[f];
  it[f] = f === 'qty' ? Math.max(1, parseInt(v)||1) : v;
  const lbl = {qty:'Кількість',dl:'Термін',pr:'Пріоритет',note:'Примітка'};
  if (String(old) !== String(it[f])) addLog(`${it.n}${it.c?' '+it.c:''} — ${lbl[f]}: "${old||'—'}" → "${it[f]}"`);
  saveData(); renderLog();
}

function chDeadline(v) {
  const old = cur.deadline; cur.deadline = v;
  if (old !== v) addLog(`Термін замовлення: "${old||'—'}" → "${v||'—'}"`);
  saveData(); renderOrderView();
}

function addLog(text) { cur.log.push({role, name: role==='hybro'?'HYBRO':'Виконавець', time:ts(), text}); }

function renderLog() {
  document.getElementById('tab-log').innerHTML = cur.log.slice().reverse().map(e => `
    <div class="log-e log-${e.role||'sys'}">
      <div class="log-nm">${e.name||'Система'}</div>
      <div class="log-ts">${e.time}</div>
      <div style="font-size:13px">${e.text}</div>
    </div>`).join('') || '<div class="empty">Журнал порожній</div>';
}

function chStatus(ns, lt) {
  cur.status = ns;
  if (ns !== 'accepted') cur._editingAccepted = false;
  addLog(lt);
  saveData(); renderOrderView(); renderStats();
}

function renderAct() {
  const o = cur; let h = '';
  if (role === 'hybro') {
    if (o.status === 'draft') {
      if (o.items.length) h += `<button class="btn btn-p" onclick="chStatus('sent','Замовлення відправлено виконавцю')">Відправити виконавцю</button>`;
      else h += `<span style="font-size:12px;color:var(--text2)">Додайте хоча б одну позицію перед відправкою</span>`;
    }
    if (o.status === 'sent') h += `<span style="font-size:12px;color:var(--text2)">Очікуємо відповіді від виконавця</span>`;
    if (o.status === 'review') {
      h += `<button class="btn btn-p" onclick="chStatus('accepted','HYBRO погодив — замовлення прийнято обома сторонами')">Погодити та прийняти</button>`;
      h += `<button class="btn" onclick="chStatus('sent','HYBRO скоригував і повторно відправив виконавцю')">Відправити повторно</button>`;
    }
    if (o.status === 'approved') h += `<button class="btn btn-p" onclick="chStatus('accepted','HYBRO підтвердив — замовлення прийнято обома сторонами')">Підтвердити та прийняти</button>`;
    if (o.status === 'accepted') h += `<span style="font-size:13px;color:#0F6E56;font-weight:500">Прийнято обома сторонами</span>`;
    if (o.status === 'cancelled') h += `<button class="btn" onclick="chStatus('draft','Замовлення відновлено як чернетку')">Відновити як чернетку</button>`;
  }
  if (role === 'exec') {
    if (o.status === 'sent') {
      h += `<button class="btn btn-g" onclick="execApprove()">Погодити</button>`;
      h += `<button class="btn" onclick="execReview()">Запропонувати корективи</button>`;
    }
    if (o.status === 'review') h += `<span style="font-size:12px;color:var(--text2)">Очікуємо відповіді від HYBRO</span>`;
    if (o.status === 'approved' || o.status === 'accepted') h += `<span style="font-size:13px;color:#0F6E56;font-weight:500">Ваше погодження отримано</span>`;
  }
  document.getElementById('actRow').innerHTML = h;
}

function showModal(title, body, hasInput, inputPlaceholder, btnOk, btnOkClass, onOk, btnCancel) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  const inp = document.getElementById('modalInput');
  if (hasInput) { inp.style.display = ''; inp.placeholder = inputPlaceholder || ''; inp.value = ''; setTimeout(() => inp.focus(), 50); }
  else { inp.style.display = 'none'; }
  document.getElementById('modalBtns').innerHTML = `
    <button class="btn" onclick="closeModal()">${btnCancel || 'Скасувати'}</button>
    <button class="btn ${btnOkClass||'btn-p'}" onclick="modalConfirm()">${btnOk}</button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  window._modalOnOk = onOk;
}

function modalConfirm() {
  const val = document.getElementById('modalInput').value.trim();
  closeModal();
  if (window._modalOnOk) window._modalOnOk(val);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  window._modalOnOk = null;
}

function execApprove() {
  showModal(
    'Погодити замовлення',
    'Ви підтверджуєте погодження цього замовлення?',
    true, 'Коментар (необов\'язково)...',
    'Погодити', 'btn-g',
    (comment) => {
      if (comment) addLog('Коментар виконавця: ' + comment);
      chStatus('approved', 'Виконавець погодив замовлення');
    }
  );
}

function execReview() {
  showModal(
    'Запропонувати корективи',
    'Опишіть що потрібно змінити у замовленні.',
    true, 'Необхідні корективи...',
    'Відправити', 'btn-p',
    (comment) => {
      if (comment) addLog('Коментар виконавця: ' + comment);
      chStatus('review', 'Виконавець запропонував корективи і повернув на доопрацювання');
    }
  );
}

function printOrder() {
  document.getElementById('tab-items').classList.add('active');
  document.getElementById('tab-sum').classList.add('active');
  document.getElementById('tab-log').classList.remove('active');
  renderSum(); window.print();
  setTimeout(() => {
    document.getElementById('tab-sum').classList.remove('active');
  }, 600);
}

// ── Settings ──────────────────────────────────────────────────
function openSettings() { renderPinForms(); sv('vSettings'); }
function closeSettings() { renderStats(); renderList(); sv('vMain'); }

function renderPinForms() {
  document.getElementById('pinForms').innerHTML = `
    <div style="margin-bottom:20px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)">PIN для HYBRO</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="password" id="pH1" placeholder="Поточний PIN" maxlength="6" style="width:135px">
        <input type="password" id="pH2" placeholder="Новий PIN" maxlength="6" style="width:135px">
        <button class="btn btn-sm btn-p" onclick="chPin('hybro')">Змінити</button>
      </div>
    </div>
    <div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)">PIN для Виконавця</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="password" id="pE1" placeholder="Поточний PIN" maxlength="6" style="width:135px">
        <input type="password" id="pE2" placeholder="Новий PIN" maxlength="6" style="width:135px">
        <button class="btn btn-sm btn-p" onclick="chPin('exec')">Змінити</button>
      </div>
    </div>`;
  document.getElementById('pinMsg').style.display = 'none';
}

function chPin(r) {
  const c_ = document.getElementById(r==='hybro'?'pH1':'pE1').value;
  const nw = document.getElementById(r==='hybro'?'pH2':'pE2').value;
  const msg = document.getElementById('pinMsg');
  if (c_ !== PINS[r]) { msg.style.display='block'; msg.style.color='var(--red)'; msg.textContent='Невірний поточний PIN'; return; }
  if (!nw || nw.length < 4) { msg.style.display='block'; msg.style.color='var(--red)'; msg.textContent='Мінімум 4 символи'; return; }
  PINS[r] = nw; saveData(); updHint();
  msg.style.display = 'block'; msg.style.color = 'var(--green)';
  msg.textContent = `PIN для ${r==='hybro'?'HYBRO':'Виконавця'} успішно змінено`;
  document.getElementById(r==='hybro'?'pH1':'pE1').value = '';
  document.getElementById(r==='hybro'?'pH2':'pE2').value = '';
  showToast('PIN-код змінено');
}

// ── Init ──────────────────────────────────────────────────────
loadData(true);
</script>
